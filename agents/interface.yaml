interface:
  display_name: "X Post Risk Reviewer"
  short_description: "Evidence-backed X post publish decisions with detector provenance"
  default_prompt: "Use $x-post-risk-reviewer to review these draft X posts. Return PASS, REVISE, STOP, or NEEDS_CONTEXT, cite material evidence, and show exactly which policy sources, project rules, open-source models, hosted APIs, and Agent reasoning actually ran. Do not invent rewrites for PASS results."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"

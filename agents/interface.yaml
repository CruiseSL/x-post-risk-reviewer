interface:
  display_name: "X Post Risk Reviewer"
  short_description: "Pre-publication risk review for draft X posts with optional local or model signals"
  default_prompt: "Use $x-post-risk-reviewer to review these draft X posts before publishing. Give per-post risk, policy areas, batch-pattern risk, signal-runner limits, and compliant rewrites where needed."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
